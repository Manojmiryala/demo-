            min-height: 100vh;

        .container {
            width: 90%;
            max-width: 1200px;

        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #00d4ff;
        }

        form {
            text-align: center;
            margin-bottom: 20px;

        input[type="file"] {
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            margin-right: 10px;
            border: none;

        button {
            padding: 10px 20px;
            background: #00d4ff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00aacc;
            color: #fff;
        }

        .img-preview {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .img-preview div {
            text-align: center;
            margin: 10px;
        }

        .img-preview img {
            max-width: 400px;
            border-radius: 12px;
            border: 2px solid #00d4ff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h3 {
            text-align: center;
            margin-top: 20px;
            font-size: 1.8rem;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge.normal { background: #28a745; color: #fff; }   /* Green */
        .badge.benign { background: #ffc107; color: #000; }  /* Yellow/Orange */
        .badge.malignant { background: #dc3545; color: #fff; } /* Red */

        .prob-table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
            text-align: center;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .prob-table th, .prob-table td {
            border: 1px solid #00d4ff;
            padding: 12px;
        }

        .prob-table th {
            background: #00d4ff;
            color: #000;
        }

        .prob-table td {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lung Cancer Detection</h2>
        <form id="upload-form" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <button type="submit">Predict</button>
        </form>
        <div class="result" id="result">
            {% if result %}
                <div class="img-preview">
                    <div>
                        <b>Uploaded Image:</b><br>
                        <img src="{{ result.image_path }}" alt="Uploaded Image">
                    </div>
                    <div>
                        <b>ROI Used for Prediction:</b><br>
                        <img src="{{ result.roi_path }}" alt="ROI Image">
                    </div>
                </div>
                <h3>
                    Prediction: {{ result.prediction }}
                    <span class="badge {{ result.prediction|lower }}">{{ result.prediction }}</span>
                </h3>
                <table class="prob-table">
                    <tr><th>Class</th><th>Probability</th></tr>
                    {% for label, prob in result.probabilities.items() %}
                    <tr>
                        <td>{{ label }}</td>
                        <td>{{ '%.4f'|format(prob) }}</td>
                    </tr>
                    {% endfor %}
                </table>
            {% endif %}
        </div>
    </div>

    <script>
        document.getElementById('upload-form').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData,
                headers: {'X-Requested-With': 'XMLHttpRequest'}
            });
            const data = await response.json();
            let html = '';
            if (data.prediction) {
                let badgeClass = data.prediction.toLowerCase();
                html += `<div class="img-preview">`;
                html += `<div><b>Uploaded Image:</b><br><img src="${data.image_path}" alt="Uploaded Image"></div>`;
                html += `<div><b>ROI Used for Prediction:</b><br><img src="${data.roi_path}" alt="ROI Image"></div>`;
                html += `</div>`;
                html += `<h3>Prediction: ${data.prediction} <span class="badge ${badgeClass}">${data.prediction}</span></h3>`;
                html += `<table class="prob-table"><tr><th>Class</th><th>Probability</th></tr>`;
                for (const [label, prob] of Object.entries(data.probabilities)) {
                    html += `<tr><td>${label}</td><td>${prob.toFixed(4)}</td></tr>`;
                }
                html += `</table>`;
            } else if (data.error) {
                html = `<span style="color:red;">Error: ${data.error}</span>`;
            }
            document.getElementById('result').innerHTML = html;
        };
    </script>
</body>
</html> -->
